name: Kubernetes Manifest Checks

on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.github/workflows/k8s-manifest-checks.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-manifests:
    name: Render and Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.7.0"
          curl -L -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Render all kustomizations
        run: |
          mkdir -p rendered
          find . -type f \( -name 'kustomization.yaml' -o -name 'kustomization.yml' \) | while read -r file; do
            dir="$(dirname "$file")"
            out="rendered/$(echo "$dir" | tr '/' '_').yaml"
            echo "Rendering $dir -> $out"
            kubectl kustomize "$dir" > "$out"
          done

      - name: Validate rendered manifests
        run: |
          kubeconform \
            -summary \
            -strict \
            -ignore-missing-schemas \
            rendered/*.yaml
