name: Kubernetes Manifest Checks

on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.github/workflows/k8s-manifest-checks.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-manifests:
    name: Render and Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.7.0"
          curl -L -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Render kustomizations
        run: |
          set -euo pipefail
          mkdir -p rendered

          mapfile -t kustomizations < <(find apps -type f -name 'kustomization.yaml' | sort)

          if [ "${#kustomizations[@]}" -eq 0 ]; then
            echo "No kustomization.yaml files found under apps/"
            exit 1
          fi

          echo "Found kustomizations:"
          printf ' - %s\n' "${kustomizations[@]}"

          for file in "${kustomizations[@]}"; do
            dir="$(dirname "$file")"
            out="rendered/$(echo "$dir" | tr '/' '_').yaml"
            echo "Rendering $dir -> $out"
            kubectl kustomize "$dir" > "$out"
          done

          echo "Rendered files:"
          ls -lah rendered

      - name: Validate rendered manifests
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(rendered/*.yaml)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No rendered manifests found after kustomize step."
            exit 1
          fi

          kubeconform \
            -summary \
            -strict \
            -ignore-missing-schemas \
            "${files[@]}"
