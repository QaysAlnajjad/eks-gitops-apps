apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-ingress
  namespace: demo
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/group.name: apps
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /sample
            pathType: Prefix
            backend:
              service:
                name: sample-service
                port:
                  number: 80
