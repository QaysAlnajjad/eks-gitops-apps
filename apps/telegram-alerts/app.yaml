apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telegram-alerts
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/QaysAlnajjad/eks-gitops-apps.git
    targetRevision: main
    path: apps/telegram-alerts
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
